# Netlify build & deploy config for the IITM MTech AI 60-day prep app.

[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  # Pin a Node version Netlify supports that matches our local toolchain.
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — every unknown path serves index.html so React Router can
# handle deep links like /day/5 or /mock without 404ing.
# Functions and the PWA service worker take precedence.
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security response headers applied to every HTML/JS/CSS asset Netlify serves.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Long-cache immutable hashed assets, no caching for SW so updates roll out.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=3600"
