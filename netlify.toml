# Netlify build & deploy config for the IITM MTech AI 60-day prep app.

[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  # Pin a Node version Netlify supports that matches our local toolchain.
  NODE_VERSION = "20"

# SPA fallback — every unknown path serves index.html so React Router can
# handle deep links like /day/5 or /mock without 404ing.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
